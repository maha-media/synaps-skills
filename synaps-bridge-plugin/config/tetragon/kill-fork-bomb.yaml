# ⚠️ KNOWN GAP — Tetragon stable has no per-PID rate-limit primitive (2026-05)
#
# This policy FAILS TO LOAD on Tetragon v1.7.0 (current stable) with:
#   unknown field "matchRateLimit"
#
# Root cause: The original design used `matchRateLimit` as a first-class
# selector — this was either an internal/unmerged feature or has been removed
# from the Tetragon stable API by v1.7.0.  It does not exist in v1.7's CRD.
#
# The `rateLimit` field that DOES exist (on `matchActions[]`) limits only
# the EVENT EMISSION RATE — i.e., how often Tetragon logs/posts an event.
# It cannot count per-process trigger invocations, so it cannot detect
# fork-bombs (which need "PID X called wake_up_new_task > N times/sec").
#
# PRIMARY FORK-BOMB DEFENCE in SCP: the workspace container's pids.max
# cgroup limit, set at container-creation time via --pids-limit (Docker) or
# the cgroup v2 pids.max interface.  This is the OS-native fork-bomb defence
# and is layer-appropriate per PHASE_6_SPEC_ADDENDUM.md §9.x:
#   • cgroup pids.max  → hard cap enforced by the kernel, no BPF required
#   • JS Reaper        → graceful workspace cleanup at application layer
#   • Tetragon         → cross-container kernel kill-switch for OTHER policies
#                        (egress block, module load, etc.)
#
# When/if Tetragon ships a per-PID counting primitive (e.g. a BPF map-backed
# per-process counter selector), this YAML should be revisited and redesigned
# against the new stable API.
#
# This file intentionally CONTINUES TO FAIL to load — that is the expected
# behaviour, documented in the smoke playbook (phase-5-supervisor.md Step 2).
# The spec content below is preserved as a readable record of the original
# design intent, analogous to kill-cpu-runaway.yaml's "documented stub" status.
#
# kill-fork-bomb.yaml
#
# Purpose
# ───────
# Detect and terminate fork-bomb attacks inside workspace containers.
# A fork bomb (:() { :|: & }; :) rapidly creates thousands of processes,
# exhausting the kernel's PID space and starving the host.
#
# Mechanism
# ─────────
# Tetragon's RateLimit selector is used to count how many times a given
# PID calls the fork/clone path (wake_up_new_task is triggered once per
# new task spawned by any clone/fork/vfork syscall).  When a single
# process spawns more than `rate` new tasks within `interval` the
# Sigkill action is applied to that process.
#
# Threshold rationale
# ───────────────────
# A legitimate build process (make -j16) may fork 100–200 short-lived
# subprocesses per second.  A fork bomb typically saturates at thousands
# per second.  The threshold below (200 forks / 1 s from a single PID)
# is a conservative limit that catches bombs while tolerating heavy
# parallel builds.  Adjust `rate` and `interval` per your workload.
#
# User-visible behaviour
# ──────────────────────
# • The offending process receives SIGKILL immediately when the rate is
#   exceeded.  All descendant tasks share the same fate via OOM/orphan
#   cleanup.
# • tetra getevents will show a PROCESS_KPROBE event with action=Sigkill
#   for the offending PID.
#
# Tetragon RateLimit docs:
#   https://tetragon.io/docs/concepts/policy-rules/rate-limit/
# Tetragon tracing policy docs:
#   https://tetragon.io/docs/concepts/tracing-policy/
#
# Note: wake_up_new_task is a kernel-internal function (not a syscall).
# Use `syscall: false`.  It is called once per task created regardless
# of whether the creator used fork(2), clone(2), or vfork(2).
#
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: kill-fork-bomb
  labels:
    synaps-control-plane: "v0"
spec:
  kprobes:
    - call: "wake_up_new_task"
      syscall: false
      # No args needed — we only care about the calling PID, which Tetragon
      # tracks automatically for the RateLimit selector.
      selectors:
        - matchRateLimit:
            # Trigger if a single PID calls wake_up_new_task more than
            # 200 times within any 1-second sliding window.
            # NOTE: Tetragon >= 1.2 introduced matchRateLimit as a first-class
            # selector.  If using an older version, combine MapAction counters
            # with a Sigkill action — see the comment block below.
            rate: 200
            interval: "1s"
            # Scope the rate counter to the calling process (per-PID).
            # Without this, the counter is global across all processes.
            # TODO: Confirm `perProcess: true` field name against your
            # Tetragon version's CRD schema.  Some releases use `perPid`.
            # Reference: https://tetragon.io/docs/concepts/policy-rules/rate-limit/
            perProcess: true
          matchActions:
            - action: Sigkill
      # ── Alternative implementation for Tetragon < 1.2 ──────────────────────
      # If matchRateLimit is not available, implement a counter using
      # MapAction + Sigkill:
      #
      #   selectors:
      #     - matchActions:
      #         - action: TrackSyscall   # increments per-PID counter in a BPF map
      #         - action: Sigkill
      #           rateLimit:             # some versions support inline rateLimit
      #             interval: "1s"
      #             count: 200
      #
      # Consult: https://tetragon.io/docs/concepts/tracing-policy/actions/
      # ───────────────────────────────────────────────────────────────────────
