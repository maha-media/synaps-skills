# block-kernel-modules.yaml
#
# Purpose
# ───────
# Prevent workspace container processes from loading kernel modules via
# finit_module(2) / init_module(2).  Even when a container has CAP_SYS_MODULE
# this policy intercepts the syscall at the kernel level and returns -EPERM,
# providing a defence-in-depth layer beyond seccomp profiles.
#
# What it blocks
# ──────────────
# • insmod / modprobe inside any non-init user namespace
# • Python ctypes / cffi attempts to load .ko files
# • Any process calling finit_module(2) or init_module(2)
#
# User-visible behaviour
# ──────────────────────
# • insmod foo.ko      → "insmod: ERROR: could not insert module foo.ko: Operation not permitted"
# • modprobe <module>  → "modprobe: FATAL: Module <x> not found or Operation not permitted"
#
# Scope
# ─────
# The `matchNamespaces` selector targets processes running in a non-init
# user namespace (i.e., container workloads).  The init namespace (the host
# kernel's own module loader) is excluded so legitimate system maintenance
# is not blocked.
#
# Tetragon docs: https://tetragon.io/docs/concepts/tracing-policy/
# Namespace selectors: https://tetragon.io/docs/concepts/tracing-policy/selectors/#namespace-selectors
#
# Note on syscall naming: Tetragon hooks the architecture-specific syscall
# entry point.  On x86-64 this is __x64_sys_finit_module and
# __x64_sys_init_module.  On arm64 use __arm64_sys_finit_module etc.
# Adjust the `call` field for your target architecture.
#
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-kernel-modules
  labels:
    synaps-control-plane: "v0"
spec:
  # ── KERNEL-SYMBOL SENSITIVITY ────────────────────────────────────────────────
  #
  # On some Ubuntu HWE kernels (e.g. 7.0.0-15-generic, observed during Pass 2
  # smoke on 2026-05-10), __x64_sys_finit_module and __x64_sys_init_module may
  # exist only as ".cold" out-of-line symbols in /proc/kallsyms.  In that case
  # the kprobe attaches successfully (Tetragon reports "Added kprobe") but NEVER
  # fires on real insmod/modprobe invocations — the hot path is inlined or has a
  # different symbol name on that kernel build.
  #
  # Before relying on this policy in production, operators MUST verify:
  #   1. grep "sys_(f?init_module)" /proc/kallsyms
  #      Confirm a non-.cold "T" symbol exists (e.g. "T __x64_sys_finit_module").
  #   2. Run: insmod /tmp/fake.ko from a seccomp=unconfined test container and
  #      confirm `tetra tracingpolicy list` shows NPOST > 0 for block-kernel-modules.
  #
  # Docker's default seccomp profile already blocks init_module / finit_module
  # from unprivileged containers (EPERM before the syscall reaches the kernel).
  # This policy is therefore defence-in-depth for scenarios where seccomp is
  # relaxed: privileged containers, custom seccomp profiles, or bare-metal hosts
  # running workspaces without Docker's seccomp filter.
  #
  # ────────────────────────────────────────────────────────────────────────────
  kprobes:
    # ── finit_module(2) — most common path (insmod / modprobe) ───────────────
    - call: "__x64_sys_finit_module"
      syscall: true
      selectors:
        - matchNamespaces:
            # Only intercept processes running inside a user namespace
            # (container workloads).  Processes in the host init namespace
            # (nstype: User, operator: NotIn, values: ["host_ns"]) are excluded.
            # NOTE: Tetragon v1.7+ requires "host_ns" (not bare "host") as the
            # special sentinel value for the init namespace in matchNamespaces.
            # Using "host" causes the policy to be rejected at load time.
            - namespace: User
              operator: "NotIn"
              values:
                - "host_ns"
          matchActions:
            - action: Override
              argError: -1   # -EPERM

    # ── init_module(2) — legacy path (older tooling) ─────────────────────────
    - call: "__x64_sys_init_module"
      syscall: true
      selectors:
        - matchNamespaces:
            - namespace: User
              operator: "NotIn"
              values:
                - "host_ns"
          matchActions:
            - action: Override
              argError: -1   # -EPERM
