      "id": "objective",
      "heading": "Objective",
      "type": "prose",
      "md": "Turn the plans server from a **manually-run foreground process** (today: `plan serve` in a tmux window, never exits) into an **on-demand, host-supervised Synaps sidecar** an orchestrator spawns with one trigger — with **at most one HTTP server per repo**.\n\n**Decisions (human, recorded):** (1) **B — session/parent-bound lifetime**; (2) **include the formal `provides.sidecar` manifest entry** (protocol v2).\n\n**Hard constraint (human):** the sidecar process is **owned by and bound to its parent Synaps**. It is **never handed to another Synaps and never runs independently**. Its lifetime equals the parent session's. There is **no detached daemon.**\n\n**Coder:** tmux agent in pane `27:0.1` (model: session `claude-opus-4-8`). **Orchestrator:** plans, reviews, steers, verifies — never writes product code. Node stdlib only, loopback-only, token-gated."
    },
    {
      "id": "current-state",
      "heading": "Current state & gap",
      "type": "prose",
      "md": "`bin/plan.js serve` calls `startServer` → `createServer().listen(0,'127.0.0.1')` and blocks forever. `plan new`/`plan open` do the same inline, so every invocation spins up a **new** server on a **new** port — N invocations = N servers. The Synaps extension (`runStdioExtension`) lazily starts one HTTP server per *session* via `plan/serve`, but there is **no repo-scoped coordination**, no health endpoint, no server record, no stop command, no stale detection, and no first-class sidecar surface an orchestrator can trigger."
    },
    {
      "id": "design",
      "heading": "Design — parent-bound sidecar, record-based single-instance",
      "type": "prose",
      "md": "The **Synaps `provides.sidecar`** process (protocol v2) is the **primary, host-supervised** mechanism. It hosts the HTTP server **in-process**, for the **lifetime of its parent Synaps** — the host spawns it, supervises it, and tears it down on session end. No `detached`, no `.unref()`, no idle-timeout-for-sharing, no cross-session hand-off.\n\n**On-demand:** the sidecar does **not** open a listener at `init`. On `trigger{name:'plans'}` it calls `ensureServer` and emits the `{url, token}` back via a `status`/`insert_text` frame.\n\n**At-most-one-per-repo (the 'handling'):** a gitignored **server record** `.plans/.server.json` `{ pid, port, token, url, started_at, plans_dir }` coordinates across processes:\n- `ensureServer(repoRoot)`: read the record. If a server is **live** (`pid` alive) AND `GET /api/health` answers with the matching token → **reuse** it: return its `{url, token, reused:true}` and **host nothing locally** (this caller is a client of the existing server).\n- Else, acquire an `O_EXCL` lock `.plans/.server.lock`, **re-check** the record (double-checked), and if still none → **host** a server in *this* process, write the record after `listen`, release the lock. Return `{url, token, reused:false, hosted:true}`.\n- **Stale record** (`pid` dead, or health fails) → reap the record, then host. Never blind-kill an unverified pid.\n\n**Parent-bound teardown:** on `shutdown` (or parent exit / SIGTERM) the hosting sidecar closes the server and removes the record. When the owner dies, its server dies and the record goes stale; the next `trigger` from any live session re-hosts. This honors 'never independent / never handed off': a non-owner only ever *reads* an existing URL; it cannot keep a foreign server alive or adopt it.\n\n**Surfaces (all share `ensureServer`):** the sidecar (primary), the extension RPC (`plan/serve` becomes record-aware), and the CLI (`plan status`/`plan down`; `plan new`/`open` reuse a live server instead of duplicating; `plan serve` stays a foreground dev mode). Loopback-only, token-gated, no new network surface, no external deps."
    },
