      "id": "objective",
      "heading": "Objective",
      "type": "prose",
      "md": "Turn the plans server from a **manually-run foreground process** (today: `plan serve` in a tmux window, never exits) into an **on-demand, repo-singleton sidecar** an orchestrator can spawn with one idempotent call.\n\n**Two hard requirements:**\n1. **Spawn on demand** \u2014 an orchestrator runs one command and gets back a live `{url, token}`; it does not babysit a foreground process or a dedicated tmux window.\n2. **Exactly one server per repo** \u2014 concurrent/ repeated spawns must converge on a single running instance. Re-invoking returns the *existing* server; a crashed/stale instance is detected and replaced; nothing leaks duplicate ports.\n\n**Coder:** tmux agent in pane `27:0.1` (model: session `claude-opus-4-8`). **Orchestrator:** plans, reviews, steers, verifies \u2014 never writes product code. Node stdlib only, loopback-only, token-gated."
    },
    {
      "id": "current-state",
      "heading": "Current state & gap",
      "type": "prose",
      "md": "`bin/plan.js serve` calls `startServer` \u2192 `createServer().listen(0,'127.0.0.1')` and prints the URL; it blocks forever. `plan new` / `plan open` do the same inline, so every invocation spins up a **new** server on a **new** ephemeral port \u2014 N invocations = N servers. The Synaps extension (`runStdioExtension`) already lazily starts one HTTP server per *session* via the `plan/serve` RPC, but there is **no repo-scoped coordination**: two sessions or two orchestrators on the same repo each get their own server. There is no health endpoint, no server record, no stop command, no stale-instance detection."
    },
    {
      "id": "design",
      "heading": "Design \u2014 repo-singleton lifecycle",
      "type": "prose",
      "md": "A small lifecycle manager keyed by **repo root**, backed by a gitignored **server record** and an atomic **lock**:\n\n- **Server record** `.plans/.server.json` (gitignored): `{ pid, port, token, url, started_at, plans_dir }`, written atomically by the daemon *after* it is listening.\n- **`ensureServer(repoRoot)` (idempotent discover-or-spawn):**\n  1. Read the record. If `pid` is **alive** AND `GET /api/health` answers with the matching token \u2192 **reuse** \u2192 return `{url, token, reused:true}`.\n  2. Otherwise acquire an `O_EXCL` lock `.plans/.server.lock`; **re-check** the record under the lock (double-checked locking) \u2014 if a peer just won, reuse it.\n  3. Spawn a **detached** daemon (`node bin/plan.js __daemon`, `detached:true`, `stdio:'ignore'`, `.unref()`), bound to a loopback ephemeral port. The daemon writes the record once listening and removes it on `SIGTERM`/exit. Parent polls for the record (\u2264 ~3 s) then returns `{url, token, reused:false}`. Release the lock.\n- **Stale handling:** record present but `pid` dead \u2192 reap the record and respawn. `pid` alive but health fails (possible pid reuse) \u2192 treat as down, respawn; never blind-kill an unverified pid.\n- **Health:** new `GET /api/health` \u2192 token-gated `{ ok:true, pid, started_at, plans_dir }` (cheap, no plan I/O).\n- **Stop:** `stopServer(repoRoot)` reads the record, `SIGTERM`s the pid, removes the record.\n\nAll of this is loopback-only and token-gated exactly as today; no new network surface, no external deps."
    },

      "heading": "OPEN QUESTION \u2014 daemon lifetime & sidecar registration",
      "type": "prose",
      "md": "**Two coupled calls I want your decision on before the coder starts S0.**\n\n**(1) Lifetime model.**\n- **Option A \u2014 detached persistent daemon (recommended).** The server outlives the spawning session and is *shared across all sessions/orchestrators on that repo*. Lifecycle: explicit `plan down` + an **idle auto-shutdown** (no requests for N minutes \u2192 self-exit, record removed). *Pro:* true per-repo singleton; survives session restarts; matches \"one server per repo.\" *Con:* a background process you must reason about (mitigated by idle-timeout + `plan status`/`plan down`).\n- **Option B \u2014 session-bound.** The server dies with the process/session that spawned it. *Pro:* no lingering daemon. *Con:* not actually shared across sessions \u2014 re-spawns per session; weaker singleton.\n\n**(2) Formal Synaps sidecar entry (`provides.sidecar`, protocol v2).** Add a manifest sidecar with a `plans` lifecycle command that, on `trigger`, calls `ensureServer` and emits the URL via a `status`/`insert_text` frame \u2014 **in addition to** the CLI? Or ship the CLI surface now and defer the manifest sidecar entry?\n\n**My recommendation: A + add the sidecar entry.** Option A is the only model that satisfies \"one server per repo\" across sessions; the CLI `plan up/down/status` is the workhorse and the `provides.sidecar` entry gives orchestrators the official spawn surface. **S0\u2013S2 are written for Option A**; if you pick B, S0 drops the idle-timeout + detach and binds lifetime to the parent. S5 (sidecar manifest) is gated on call (2). Answer via the Plan Inbox or just tell me A/B and yes/defer on the sidecar entry."
