      "heading": "Objective",
      "type": "prose",
      "md": "Make the Plan Site's **identity + visual theme dynamic and per-repo**, generated **by the LLM** from the repo's own files. The Maha Media brand becomes the **default theme**; every repo gets a distinct, fitting title + palette + font pairing + monogram. Goal (operator): **engagement / dopamine** — the site should feel like *that* project.\n\nSpec: `specs/dynamic-theme.md`. Schema: `engtheme/1`. Decisions (human-approved): **(1)** fonts = curated **bundled local WOFF2 library + system stacks** (no CDN, no runtime network); **(2)** `theme.json` is **committed** (regenerable); **(3)** identity = **generated wordmark + monogram** (no external logo); **(4)** `plan new` seeds a deterministic theme, `plan theme` is the LLM-upgrade path.\n\n**Coder:** tmux agent in pane `27:0.1` (model: session `claude-opus-4-8`). **Orchestrator:** plans, reviews, steers, verifies — never writes product code. Node stdlib only, vanilla JS, loopback-only, token-gated."
