      "type": "prose",
      "md": "**This is the one decision I want your call on before the coder starts G1.**\n\nWhen a project **already has** a `.plans/.gitignore` (hand-written or from an older toolkit version), should the plugin *update* it to add the runtime-artifact rules, or leave it untouched?\n\n**Option A \u2014 Managed block (recommended).** Wrap the plugin's rules in delimited markers and merge idempotently:\n\n```\n# >>> engineering plans (managed \u2014 do not edit inside) >>>\nagents.json\n*.events.json\n*.notes.json\n*.oracle.jsonl\n*.tmp-*\n*.lock\n# <<< engineering plans (managed) <<<\n```\nOn each call: if no file \u2192 write file with the block; if file exists **without** the block \u2192 **append** the block (preserve all user lines); if the block exists but differs \u2192 replace only the block's interior. User content outside the markers is never touched.\n*Pro:* every project becomes correct, including upgrades. *Con:* the plugin now edits a file it didn't fully author (mitigated by strict marker confinement).\n\n**Option B \u2014 Leave existing files untouched (current behavior).** Only new projects get the rules; existing custom files are never modified.\n*Pro:* zero surprise. *Con:* upgrades silently miss the fix; the \ud83d\udfe1 finding stands.\n\n**My recommendation: Option A** \u2014 it actually delivers \"fix every project by default,\" and the managed-block markers make the edit auditable and reversible. **G1 is written for Option A**; if you pick B, G1 collapses to a no-op and we keep current behavior. Answer via the Plan Inbox (an open question event is posted) or just tell me."
