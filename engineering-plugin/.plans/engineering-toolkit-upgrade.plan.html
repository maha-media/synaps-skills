      "id": "decision-rootcause",
      "heading": "Root cause of the \"Loading\u2026\" stall",
      "type": "prose",
      "md": "The renderer never runs because of a **self-inconsistent security design** in `extensions/plans_server.js`:\n\n1. **Assets are token-gated (primary bug).** The token gate at **line 136** runs for *all* routes, including `/_assets/*` (served at line 140). The page's asset script tags carry **no token**, so every renderer script returns **HTTP 401**. Verified: `GET /_assets/plan.js` \u2192 401; with `?token=` \u2192 200.\n2. **Token delivered via a CSP-blocked inline script (secondary bug).** The token is injected as an inline script setting `window.__PLAN_TOKEN__` (**line 109**), but the CSP at **line 71** is `script-src 'self'` with **no `'unsafe-inline'`**, so the browser blocks it \u2192 the global is never set \u2192 API/SSE calls (`assets/plan.js` ~120, ~211) would 401 even if assets loaded.\n\nBoth must be fixed for live mode to work."
    },

      "id": "decision-fix",
      "heading": "Fix approach",
      "type": "prose",
      "md": "**Exempt static assets from auth; deliver the token without inline JS.**\n\n- **Fix A:** Serve `/_assets/*` **before** the token gate (static renderer code is non-sensitive: JS/CSS, identical for every viewer, no plan data). Keep path-confinement (`safeRealpath`/`isInside`) intact.\n- **Fix B:** Make `assets/plan.js` derive the token from `window.location.search` (`?token=`) as a fallback when the injected global is unset \u2014 the page URL already carries it, so no inline script is needed and CSP stays strict. Keep the existing global path as primary.\n\n**Rejected:** adding `'unsafe-inline'` to CSP (weakens the XSS posture we deliberately built); per-response CSP nonce (more moving parts than needed)."
