<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="engplan-schema" content="engplan/1">
  <title>{{THEME_TITLE}}</title>
  <link rel="stylesheet" href="/_assets/plan.css">
  <link rel="stylesheet" href="/_assets/site.css">
  <!-- theme.css is generated per-repo from .plans/theme.json (engtheme/1) and
       linked LAST so its :root palette/fonts win over the plan.css fallbacks
       (which remain for file:// degraded mode). Applied pre-paint: no FOUC. -->
  <link rel="stylesheet" id="theme-css" href="/_assets/theme.css">
  <script defer src="/_assets/engplan.js"></script>
  <script defer src="/_assets/md.js"></script>
  <script defer src="/_assets/sanitize.js"></script>
  <script defer src="/_assets/plan.js"></script>
  <script defer src="/_assets/site.js"></script>
</head>
<body>
  <button class="rail-toggle" id="rail-toggle" type="button" aria-label="Toggle plans sidebar" aria-expanded="false">☰ Plans</button>
  <div id="site" class="site-shell">
    <aside id="sidebar" class="sidebar-rail">
      <header class="brand">
        <span class="brand-monogram" id="brand-monogram" aria-hidden="true">{{THEME_MONOGRAM}}</span>
        <span class="brand-identity">
          <span class="brand-title" id="brand-title">{{THEME_TITLE}}</span>
          <span class="brand-tagline" id="brand-tagline">{{THEME_TAGLINE}}</span>
        </span>
      </header>
      <div class="sidebar-search">
        <input id="plan-search" type="search" placeholder="Filter plans…" autocomplete="off" spellcheck="false" aria-label="Filter plans">
      </div>
      <nav id="plan-list" class="plan-list" aria-label="Plans">Loading plans…</nav>
    </aside>
    <main id="view" class="view">
      <div id="app"><div class="empty-state"><p>Select a plan from the sidebar.</p></div></div>
    </main>
  </div>
</body>
</html>
